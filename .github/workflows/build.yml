name: Build

# Mirrors the iosuite.io build workflow shape so the deploy story
# stays uniform across the *-serve modules: push to main → publish
# images tagged `:uat` and `:sha-<commit>` to ghcr.io. UAT's
# vps-config-uat tracks `:uat` floating; per-commit pinning uses the
# sha tag.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Tag to build'
        required: true
        default: 'uat'
        type: choice
        options: [uat, prod]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ls-ads/ffmpeg-serve

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "environment=uat" >> $GITHUB_OUTPUT
          fi

  build-cpu:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=${{ needs.setup.outputs.environment }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.cpu
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          provenance: false
          build-args: |
            VERSION=${{ github.sha }}
            COMMIT=${{ github.sha }}
